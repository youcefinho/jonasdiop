name: Deploy Production

# Auto-trigger on push to main + manual dispatch fallback. The all-green
# CI gates (typecheck, lint, tests, build, bundle budget) keep "push =
# deploy" safe — if any gate fails, the deploy step is never reached.
on:
  push:
    branches: [main]
    # Skip deploy when only docs/CI files change — keeps deploy noise low.
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      # Build FIRST so that TanStack Router's auto-generated
      # `src/routeTree.gen.ts` exists before typecheck runs. The file is
      # gitignored (regenerated by the Vite router-plugin) so on a fresh CI
      # checkout it's absent, and any new createFileRoute('/path') would
      # fail typecheck with "is not assignable to keyof FileRoutesByPath".
      # Build-before-check costs ~30s but unblocks the gate cleanly.
      - name: Build
        run: bun run build

      # Gate prod deploy on full green — push trigger + belt-and-suspenders
      # defense against shipping broken main.
      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Tests
        run: bun run test:run

      - name: Bundle size budget
        run: bun run check:bundle-size

      - name: Deploy to Cloudflare (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
