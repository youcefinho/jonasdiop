<!doctype html>
<html lang="fr-CA">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Preload primary variable fonts (latin) for LCP — Perf Vague 2.
         Eliminates the Fontsource JS-import render-blocking chain (~580ms saved
         per Lighthouse audit). Inter Variable = body, Space Grotesk = display.
         The latin-ext variants charge on-demand via unicode-range when a glyph
         outside U+0000-00FF is hit (e.g. ™ ‟ etc.). -->
    <link rel="preload" href="/fonts/space-grotesk-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Critical CSS inline (Perf Vague 3+5) — paints dark/themed page +
         locks Hero H1 at final Tailwind size on the very first paint, so the
         LCP element doesn't reflow when the main stylesheet finishes loading.
         Trade-off : ~800 bytes inline (negligible) vs LCP repaint cost. -->
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; }
      body {
        background: oklch(0.16 0.005 80);
        color: oklch(0.94 0.005 80);
        font-family: "Inter Variable", system-ui, -apple-system, "Segoe UI", sans-serif;
        font-synthesis: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      h1, h2, h3, .font-display { font-family: "Space Grotesk Variable", system-ui, sans-serif; }
      #root { min-height: 100vh; }
      /* Hero H1 — LCP element. Inline final Tailwind utilities so the H1
         lands at full text-hero clamp size from the 1st paint (no resize
         when async CSS bundle finishes loading). Matches className passed
         in src/components/sections/Hero.tsx. */
      .hero-h1-lcp {
        font-family: "Space Grotesk Variable", system-ui, sans-serif;
        font-size: clamp(2.5rem, 1.5rem + 3.5vw, 5rem);
        font-weight: 400;
        letter-spacing: -0.045em;
        line-height: 1.05;
        max-width: 26ch;
        text-wrap: balance;
        color: oklch(0.94 0.005 80);
        margin: 0;
      }
    </style>

    <title>Jonas Diop — Architecte d'affaires</title>
  </head>
  <body class="bg-base text-primary antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
